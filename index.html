<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>🏁 3D Turbo Racer – Porsche Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #0a0e17;
            font-family: 'Segoe UI', system-ui, sans-serif;
            touch-action: none;
            user-select: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
            flex-wrap: wrap;
            gap: 10px;
        }
        .hud-item {
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 18px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        #speedDisplay {
            color: #58a6ff;
            font-weight: 700;
        }
        #nitroDisplay {
            border-color: rgba(255, 200, 0, 0.3);
            color: #f5a623;
        }
        #controls-hint {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
        }
        #controls-hint kbd {
            background: rgba(0, 0, 0, 0.4);
            padding: 2px 10px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin: 0 4px;
        }
        #restartBtn {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: linear-gradient(135deg, #238636, #2ea043);
            border: none;
            color: #fff;
            font-weight: 700;
            font-size: 18px;
            padding: 12px 40px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(46, 160, 67, 0.4);
            transition: 0.2s;
            display: none;
            pointer-events: auto;
        }
        #restartBtn:hover {
            transform: translateX(-50%) scale(1.05);
        }
        @media (max-width: 600px) {
            #hud {
                font-size: 14px;
                padding: 0 16px;
                top: 12px;
            }
            #controls-hint {
                font-size: 11px;
                bottom: 16px;
            }
            #restartBtn {
                font-size: 16px;
                padding: 10px 32px;
                bottom: 60px;
            }
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="hud-item" id="score">🏁 0 m</div>
        <div class="hud-item" id="speedDisplay">🚀 0 km/h</div>
        <div class="hud-item" id="nitroDisplay">💨 NITRO</div>
    </div>
    <div id="controls-hint">
        <kbd>←</kbd> <kbd>→</kbd> Steer &nbsp;·&nbsp; <kbd>↑</kbd> Speed Up &nbsp;·&nbsp; <kbd>↓</kbd> Slow Down &nbsp;·&nbsp; <kbd>Space</kbd> Nitro
    </div>
    <button id="restartBtn">🔄 New Game</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.126.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ----- DOM refs -----
        const scoreDisplay = document.getElementById('score');
        const speedDisplay = document.getElementById('speedDisplay');
        const nitroDisplay = document.getElementById('nitroDisplay');
        const restartBtn = document.getElementById('restartBtn');

        // ----- Audio Engine -----
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        let engineOsc = null,
            engineGain = null;

        function startEngine() {
            if (engineOsc) return;
            initAudio();
            engineOsc = audioCtx.createOscillator();
            engineGain = audioCtx.createGain();
            engineOsc.type = 'sawtooth';
            engineOsc.frequency.setValueAtTime(35, audioCtx.currentTime);
            engineGain.gain.setValueAtTime(0.06, audioCtx.currentTime);
            engineOsc.connect(engineGain);
            engineGain.connect(audioCtx.destination);
            engineOsc.start();
        }

        function updateEngine(speedFactor) {
            if (!engineOsc) return;
            const freq = 30 + speedFactor * 90;
            engineOsc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.1);
            const vol = 0.04 + speedFactor * 0.14;
            engineGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.1);
        }

        function stopEngine() {
            if (engineOsc) {
                engineOsc.stop();
                engineOsc = null;
                engineGain = null;
            }
        }

        function playNitro() {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(350, audioCtx.currentTime + 0.25);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.25);
        }

        function playCrash() {
            initAudio();
            const bufferSize = audioCtx.sampleRate * 0.3;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.35, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            noise.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start();
            noise.stop(audioCtx.currentTime + 0.3);
        }

        // ----- Scene Setup -----
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a2639);
        scene.fog = new THREE.Fog(0x1a2639, 30, 80);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.prepend(renderer.domElement);

        // ----- Lighting -----
        const ambient = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        const d = 20;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 50;
        scene.add(dirLight);
        const fill = new THREE.DirectionalLight(0x4488ff, 0.3);
        fill.position.set(-10, 5, 10);
        scene.add(fill);

        // ----- Road Group (everything scrolls) -----
        const roadGroup = new THREE.Group();
        scene.add(roadGroup);

        const roadLength = 200;
        const roadWidth = 8;

        // Road surface
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x2a3344, roughness: 0.8, metalness: 0.1 });
        const road = new THREE.Mesh(new THREE.BoxGeometry(roadWidth, 0.1, roadLength), roadMat);
        road.position.y = -0.05;
        road.receiveShadow = true;
        roadGroup.add(road);

        // Lane markings
        const markMat = new THREE.MeshStandardMaterial({ color: 0xf0f6fc, emissive: 0x8899aa, emissiveIntensity: 0.2 });
        for (let z = -roadLength / 2; z < roadLength / 2; z += 3) {
            const mark = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.02, 1.5), markMat);
            mark.position.set(0, 0.06, z);
            roadGroup.add(mark);
        }

        // Road edges
        const edgeMat = new THREE.MeshStandardMaterial({ color: 0xf0f6fc, emissive: 0x8899aa, emissiveIntensity: 0.1 });
        for (let side = -1; side <= 1; side += 2) {
            const edge = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.02, roadLength), edgeMat);
            edge.position.set(side * (roadWidth / 2 - 0.3), 0.06, 0);
            roadGroup.add(edge);
        }

        // Side objects (trees/buildings)
        const colors = [0x3fb950, 0x58a6ff, 0xf0883e, 0x8b949e];
        for (let z = -roadLength / 2; z < roadLength / 2; z += 3) {
            if (Math.random() > 0.7) continue;
            const h = 0.5 + Math.random() * 1.5;
            const w = 0.5 + Math.random() * 0.5;
            const d = 0.5 + Math.random() * 0.5;
            const objMat = new THREE.MeshStandardMaterial({
                color: colors[Math.floor(Math.random() * colors.length)],
                roughness: 0.7
            });
            const obj = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), objMat);
            const side = Math.random() > 0.5 ? 1 : -1;
            const xOffset = roadWidth / 2 + 1 + Math.random() * 2;
            obj.position.set(side * xOffset, h / 2, z);
            obj.castShadow = true;
            obj.receiveShadow = true;
            roadGroup.add(obj);
        }

        // ----- Player Car – White Porsche Style -----
        const carGroup = new THREE.Group();
        scene.add(carGroup);

        // Main body: low, wide, rounded
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2, metalness: 0.7 });
        const bodyGeo = new THREE.BoxGeometry(1.0, 0.25, 1.8);
        // Slightly taper the front
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.2;
        body.castShadow = true;
        carGroup.add(body);

        // Hood scoop / front bumper
        const hoodMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.3, metalness: 0.5 });
        const hood = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.08, 0.3), hoodMat);
        hood.position.set(0, 0.38, 0.85);
        carGroup.add(hood);

        // Windshield (slanted)
        const glassMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.4, roughness: 0.1,
            metalness: 0.1 });
        const windshield = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.15, 0.5), glassMat);
        windshield.position.set(0, 0.48, 0.25);
        carGroup.add(windshield);

        // Rear window
        const rearWindow = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.15, 0.4), glassMat);
        rearWindow.position.set(0, 0.48, -0.5);
        carGroup.add(rearWindow);

        // Side windows (two small boxes)
        const sideGlassMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.3 });
        const sideL = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.15, 0.5), sideGlassMat);
        sideL.position.set(-0.5, 0.45, 0.1);
        carGroup.add(sideL);
        const sideR = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.15, 0.5), sideGlassMat);
        sideR.position.set(0.5, 0.45, 0.1);
        carGroup.add(sideR);

        // Headlights – four round (Porsche style)
        const hlMat = new THREE.MeshStandardMaterial({ color: 0xffdd44, emissive: 0xffaa00, emissiveIntensity: 0.4 });
        const hlPositions = [
            [-0.35, 0.2, 0.95],
            [-0.12, 0.2, 0.95],
            [0.12, 0.2, 0.95],
            [0.35, 0.2, 0.95]
        ];
        for (const pos of hlPositions) {
            const hl = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), hlMat);
            hl.position.set(pos[0], pos[1], pos[2]);
            carGroup.add(hl);
        }

        // Taillights – thin strip
        const tlMat = new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0xff0000, emissiveIntensity: 0.3 });
        const tl1 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.06, 0.06), tlMat);
        tl1.position.set(-0.3, 0.2, -0.95);
        carGroup.add(tl1);
        const tl2 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.06, 0.06), tlMat);
        tl2.position.set(0.3, 0.2, -0.95);
        carGroup.add(tl2);

        // Spoiler (small lip)
        const spoilerMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.4, metalness: 0.2 });
        const spoiler = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.04, 0.1), spoilerMat);
        spoiler.position.set(0, 0.4, -0.9);
        carGroup.add(spoiler);

        // Car shadow
        const shadowMat = new THREE.ShadowMaterial({ opacity: 0.3 });
        const shadowPlane = new THREE.Mesh(new THREE.PlaneGeometry(1.0, 1.8), shadowMat);
        shadowPlane.rotation.x = -Math.PI / 2;
        shadowPlane.position.y = 0.01;
        carGroup.add(shadowPlane);

        carGroup.position.set(0, 0, 0);

        // ----- Turbo Fire (exhaust flame) -----
        const flameGroup = new THREE.Group();
        carGroup.add(flameGroup);
        // We'll use a cone that scales and changes color based on nitro
        const flameMat = new THREE.MeshStandardMaterial({
            color: 0xff6600,
            emissive: 0xff4400,
            emissiveIntensity: 1.0,
            transparent: true,
            opacity: 0.8
        });
        const flameCone = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.4, 8), flameMat);
        flameCone.rotation.x = Math.PI / 2;
        flameCone.position.set(0, 0.1, -1.0);
        flameGroup.add(flameCone);
        // Add a second cone for outer glow
        const flameGlow = new THREE.Mesh(
            new THREE.ConeGeometry(0.3, 0.6, 8),
            new THREE.MeshStandardMaterial({ color: 0xff8800, emissive: 0xff5500, emissiveIntensity: 0.5, transparent: true,
                opacity: 0.3 })
        );
        flameGlow.rotation.x = Math.PI / 2;
        flameGlow.position.set(0, 0.1, -1.0);
        flameGroup.add(flameGlow);

        // Turbo flame particles (extra sparkle) – small spheres
        const particleCount = 20;
        const particleGeo = new THREE.SphereGeometry(0.03, 4, 4);
        const particleMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xff8800, emissiveIntensity: 0.8 });
        const particles = [];
        for (let i = 0; i < particleCount; i++) {
            const p = new THREE.Mesh(particleGeo, particleMat);
            p.position.set(
                (Math.random() - 0.5) * 0.3,
                (Math.random() - 0.5) * 0.3,
                -1.0 - Math.random() * 0.5
            );
            flameGroup.add(p);
            particles.push(p);
        }

        // Hide flame by default
        flameGroup.visible = false;

        // ----- Enemy Cars (front vehicles) -----
        const enemies = [];
        const enemyColors = [0xe34b4b, 0x4b7ae8, 0xe8a84b, 0x9b4be8];

        function spawnEnemy() {
            const color = enemyColors[Math.floor(Math.random() * enemyColors.length)];
            const group = new THREE.Group();

            // Body
            const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.4, metalness: 0.3 });
            const bodyMesh = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.28, 1.6), mat);
            bodyMesh.position.y = 0.28;
            bodyMesh.castShadow = true;
            group.add(bodyMesh);

            // Cabin
            const cabinEnemy = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.2, 0.8),
                new THREE.MeshStandardMaterial({ color: 0x1a2a3a }));
            cabinEnemy.position.set(0, 0.5, -0.1);
            cabinEnemy.castShadow = true;
            group.add(cabinEnemy);

            // Headlights (enemy)
            const hlE = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 6),
                new THREE.MeshStandardMaterial({ color: 0xffdd44, emissive: 0xffaa00, emissiveIntensity: 0.3 }));
            hlE.position.set(-0.25, 0.2, 0.85);
            group.add(hlE);
            const hlE2 = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 6),
                new THREE.MeshStandardMaterial({ color: 0xffdd44, emissive: 0xffaa00, emissiveIntensity: 0.3 }));
            hlE2.position.set(0.25, 0.2, 0.85);
            group.add(hlE2);

            // Taillights
            const tlE = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6, 6),
                new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0xff0000, emissiveIntensity: 0.3 }));
            tlE.position.set(-0.25, 0.2, -0.85);
            group.add(tlE);
            const tlE2 = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6, 6),
                new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0xff0000, emissiveIntensity: 0.3 }));
            tlE2.position.set(0.25, 0.2, -0.85);
            group.add(tlE2);

            // Random x position within road
            const x = (Math.random() - 0.5) * (roadWidth - 1.2);
            group.position.set(x, 0, -roadLength / 2 - 2);
            roadGroup.add(group);

            const speed = 1.5 + Math.random() * 2.5 + getSpeed() * 0.2;
            enemies.push({
                mesh: group,
                speed: speed,
                width: 0.8,
                depth: 1.6,
            });
        }

        // ----- Game State -----
        let gameRunning = true;
        let score = 0;
        let speed = 4;
        const maxSpeed = 14;
        let nitro = 100;
        let nitroActive = false;
        let frame = 0;
        let spawnCounter = 0;
        const spawnInterval = 30;

        let moveLeft = false,
            moveRight = false;
        let speedUp = false,
            slowDown = false;
        let nitroKey = false;

        function getSpeed() {
            let s = speed + Math.floor(score / 150) * 0.5;
            if (nitroActive) s *= 1.5;
            return Math.min(s, maxSpeed);
        }

        function getSpeedKmh() {
            return Math.round(getSpeed() * 8); // scale for display
        }

        // ----- Collision (world space) -----
        function getCarBox(group) {
            const pos = new THREE.Vector3();
            group.getWorldPosition(pos);
            return { x: pos.x, z: pos.z, w: 0.9, d: 1.8 };
        }

        function boxesCollide(a, b) {
            return Math.abs(a.x - b.x) < (a.w / 2 + b.w / 2) &&
                Math.abs(a.z - b.z) < (a.d / 2 + b.d / 2);
        }

        // ----- Reset -----
        function resetGame() {
            for (const e of enemies) {
                roadGroup.remove(e.mesh);
            }
            enemies.length = 0;
            gameRunning = true;
            score = 0;
            speed = 4;
            nitro = 100;
            nitroActive = false;
            frame = 0;
            spawnCounter = 0;
            carGroup.position.set(0, 0, 0);
            carGroup.rotation.y = 0;
            roadGroup.position.set(0, 0, 0);
            flameGroup.visible = false;
            scoreDisplay.textContent = '🏁 0 m';
            speedDisplay.textContent = '🚀 0 km/h';
            nitroDisplay.textContent = '💨 NITRO';
            nitroDisplay.style.color = '#f5a623';
            restartBtn.style.display = 'none';
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            startEngine();
        }

        // ----- Update -----
        function update() {
            if (!gameRunning) {
                if (engineGain) engineGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
                return;
            }

            const currentSpeed = getSpeed();
            score += 0.1 * (1 + (nitroActive ? 0.6 : 0));
            scoreDisplay.textContent = `🏁 ${Math.floor(score)} m`;
            speedDisplay.textContent = `🚀 ${getSpeedKmh()} km/h`;

            const speedFactor = Math.min(currentSpeed / maxSpeed, 1);
            updateEngine(speedFactor);

            // Nitro
            if (nitroKey && nitro > 5 && !nitroActive) {
                nitroActive = true;
                playNitro();
                // Show flame
                flameGroup.visible = true;
                // Scale flame with nitro level
            }
            if (nitroActive) {
                nitro -= 0.5;
                // Animate flame size
                const scale = 0.5 + (nitro / 100) * 1.5;
                flameCone.scale.set(scale, scale * 0.8, scale);
                flameGlow.scale.set(scale * 1.2, scale * 1.2, scale * 1.2);
                // Randomize particles
                for (const p of particles) {
                    p.position.x += (Math.random() - 0.5) * 0.02;
                    p.position.y += (Math.random() - 0.5) * 0.02;
                    p.position.z -= 0.01;
                    if (p.position.z < -1.8) {
                        p.position.z = -1.0;
                        p.position.x = (Math.random() - 0.5) * 0.3;
                        p.position.y = (Math.random() - 0.5) * 0.3;
                    }
                }
                if (nitro <= 0) {
                    nitro = 0;
                    nitroActive = false;
                    flameGroup.visible = false;
                    nitroDisplay.textContent = '⛽ EMPTY';
                    nitroDisplay.style.color = '#f85149';
                } else {
                    nitroDisplay.textContent = `💨 ${Math.floor(nitro)}%`;
                    nitroDisplay.style.color = '#f5a623';
                }
            } else {
                nitro = Math.min(100, nitro + 0.08);
                if (nitro > 20) {
                    nitroDisplay.textContent = '💨 NITRO';
                    nitroDisplay.style.color = '#f5a623';
                }
                // Hide flame if not active
                if (flameGroup.visible) flameGroup.visible = false;
            }

            // Steering
            const steerSpeed = 0.08;
            let targetRot = 0;
            if (moveLeft) targetRot = 0.4;
            if (moveRight) targetRot = -0.4;
            carGroup.rotation.y += (targetRot - carGroup.rotation.y) * 0.1;

            // Speed control
            if (speedUp) speed = Math.min(speed + 0.1, maxSpeed);
            if (slowDown) speed = Math.max(speed - 0.1, 2);

            // Move world backward
            const moveZ = currentSpeed * 0.08;
            roadGroup.position.z -= moveZ;

            // Lateral movement
            const lateral = Math.sin(carGroup.rotation.y) * currentSpeed * 0.06;
            carGroup.position.x += lateral;
            const halfRoad = roadWidth / 2 - 0.5;
            if (carGroup.position.x > halfRoad) carGroup.position.x = halfRoad;
            if (carGroup.position.x < -halfRoad) carGroup.position.x = -halfRoad;

            // Spawn enemies
            spawnCounter++;
            const spawnRate = Math.max(12, spawnInterval - Math.floor(score / 30));
            if (spawnCounter >= spawnRate) {
                spawnCounter = 0;
                if (enemies.length < 25) spawnEnemy();
            }

            // Move enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.mesh.position.z += e.speed * 0.08;

                // Collision
                const playerBox = getCarBox(carGroup);
                const enemyBox = getCarBox(e.mesh);
                if (boxesCollide(playerBox, enemyBox)) {
                    gameRunning = false;
                    playCrash();
                    stopEngine();
                    restartBtn.style.display = 'block';
                    flameGroup.visible = false;
                    return;
                }

                // Remove if passed player
                if (e.mesh.position.z > roadLength / 2 + 2) {
                    roadGroup.remove(e.mesh);
                    enemies.splice(i, 1);
                }
            }

            // Wrap road
            if (roadGroup.position.z < -roadLength) {
                roadGroup.position.z += roadLength;
            }

            // Camera follows
            const targetCamZ = -6;
            const targetCamX = carGroup.position.x * 0.3;
            camera.position.x += (targetCamX - camera.position.x) * 0.05;
            camera.position.z += (targetCamZ - camera.position.z) * 0.05;
            camera.lookAt(carGroup.position.x * 0.3, 0, -2);
        }

        // ----- Render Loop -----
        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        // ----- Input -----
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) {
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    resetGame();
                }
                return;
            }
            switch (e.key) {
                case 'ArrowLeft':
                    moveLeft = true;
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    moveRight = true;
                    e.preventDefault();
                    break;
                case 'ArrowUp':
                    speedUp = true;
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    slowDown = true;
                    e.preventDefault();
                    break;
                case ' ':
                case 'Space':
                    nitroKey = true;
                    e.preventDefault();
                    break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch (e.key) {
                case 'ArrowLeft':
                    moveLeft = false;
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    moveRight = false;
                    e.preventDefault();
                    break;
                case 'ArrowUp':
                    speedUp = false;
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    slowDown = false;
                    e.preventDefault();
                    break;
                case ' ':
                case 'Space':
                    nitroKey = false;
                    e.preventDefault();
                    break;
            }
        });

        // Touch controls
        let touchX = null;
        renderer.domElement.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            touchX = touch.clientX;
            initAudio();
            startEngine();
            speedUp = true;
        });
        renderer.domElement.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!gameRunning || touchX === null) return;
            const touch = e.touches[0];
            const delta = touch.clientX - touchX;
            touchX = touch.clientX;
            if (delta > 8) {
                moveRight = true;
                moveLeft = false;
                setTimeout(() => moveRight = false, 80);
            } else if (delta < -8) {
                moveLeft = true;
                moveRight = false;
                setTimeout(() => moveLeft = false, 80);
            }
        });
        renderer.domElement.addEventListener('touchend', (e) => {
            e.preventDefault();
            touchX = null;
            speedUp = false;
            moveLeft = false;
            moveRight = false;
        });

        restartBtn.addEventListener('click', resetGame);

        // ----- Resize -----
        window.addEventListener('resize', () => {
            const w = window.innerWidth,
                h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        // ----- Start -----
        resetGame();
        startEngine();
        animate();

        console.log('🏁 3D Turbo Racer – Porsche Edition loaded!');
    </script>
</body>
</html>
