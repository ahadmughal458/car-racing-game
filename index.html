<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>🏁 3D Turbo Racer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #0a0e17;
            font-family: 'Segoe UI', system-ui, sans-serif;
            touch-action: none;
            user-select: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* HUD overlay */
        #hud {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
        }
        #score {
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 18px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        #nitroDisplay {
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 16px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 200, 0, 0.3);
            color: #f5a623;
        }

        #controls-hint {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
            letter-spacing: 1px;
        }
        #controls-hint kbd {
            background: rgba(0, 0, 0, 0.4);
            padding: 2px 10px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin: 0 4px;
        }

        #restartBtn {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: linear-gradient(135deg, #238636, #2ea043);
            border: none;
            color: #fff;
            font-weight: 700;
            font-size: 18px;
            padding: 12px 40px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(46, 160, 67, 0.4);
            transition: 0.2s;
            display: none;
            pointer-events: auto;
        }
        #restartBtn:hover {
            transform: translateX(-50%) scale(1.05);
        }

        @media (max-width: 600px) {
            #hud {
                font-size: 14px;
                padding: 0 16px;
                top: 12px;
            }
            #controls-hint {
                font-size: 11px;
                bottom: 16px;
            }
            #restartBtn {
                font-size: 16px;
                padding: 10px 32px;
                bottom: 60px;
            }
        }
    </style>
</head>
<body>

    <!-- HUD -->
    <div id="hud">
        <div id="score">🏁 0 m</div>
        <div id="nitroDisplay">💨 NITRO</div>
    </div>
    <div id="controls-hint">
        <kbd>←</kbd> <kbd>→</kbd> Steer &nbsp;·&nbsp; <kbd>↑</kbd> Accelerate &nbsp;·&nbsp; <kbd>↓</kbd> Brake &nbsp;·&nbsp; <kbd>Space</kbd> Nitro
    </div>
    <button id="restartBtn">🔄 New Game</button>

    <!-- Three.js from CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.126.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        // ============================================================
        // IMPORTS
        // ============================================================
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.126.0/examples/jsm/controls/OrbitControls.js';

        // ============================================================
        // DOM REFS
        // ============================================================
        const scoreDisplay = document.getElementById('score');
        const nitroDisplay = document.getElementById('nitroDisplay');
        const restartBtn = document.getElementById('restartBtn');

        // ============================================================
        // AUDIO ENGINE (Web Audio – synthesized)
        // ============================================================
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        let engineOsc = null;
        let engineGain = null;

        function startEngine() {
            if (engineOsc) return;
            initAudio();
            engineOsc = audioCtx.createOscillator();
            engineGain = audioCtx.createGain();
            engineOsc.type = 'sawtooth';
            engineOsc.frequency.setValueAtTime(35, audioCtx.currentTime);
            engineGain.gain.setValueAtTime(0.06, audioCtx.currentTime);
            engineOsc.connect(engineGain);
            engineGain.connect(audioCtx.destination);
            engineOsc.start();
        }

        function updateEngine(speedFactor) {
            if (!engineOsc) return;
            const freq = 30 + speedFactor * 90;
            engineOsc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.1);
            const vol = 0.04 + speedFactor * 0.14;
            engineGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.1);
        }

        function stopEngine() {
            if (engineOsc) {
                engineOsc.stop();
                engineOsc = null;
                engineGain = null;
            }
        }

        function playNitro() {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(350, audioCtx.currentTime + 0.25);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.25);
        }

        function playCrash() {
            initAudio();
            const bufferSize = audioCtx.sampleRate * 0.3;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.35, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            noise.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start();
            noise.stop(audioCtx.currentTime + 0.3);
        }

        // ============================================================
        // THREE.JS SCENE SETUP
        // ============================================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a2639);
        scene.fog = new THREE.Fog(0x1a2639, 30, 80);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.prepend(renderer.domElement);

        // ============================================================
        // LIGHTING
        // ============================================================
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        const d = 20;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 50;
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
        fillLight.position.set(-10, 5, 10);
        scene.add(fillLight);

        // ============================================================
        // ROAD
        // ============================================================
        const roadGroup = new THREE.Group();
        scene.add(roadGroup);

        // Road surface
        const roadLength = 200;
        const roadWidth = 8;
        const roadGeo = new THREE.BoxGeometry(roadWidth, 0.1, roadLength);
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x2a3344, roughness: 0.8, metalness: 0.1 });
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.position.y = -0.05;
        road.receiveShadow = true;
        roadGroup.add(road);

        // Lane markings (dashed lines)
        const markMat = new THREE.MeshStandardMaterial({ color: 0xf0f6fc, emissive: 0x8899aa, emissiveIntensity: 0.2 });
        for (let z = -roadLength / 2; z < roadLength / 2; z += 3) {
            const mark = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.02, 1.5), markMat);
            mark.position.set(0, 0.06, z);
            roadGroup.add(mark);
        }

        // Road edges (white lines)
        const edgeMat = new THREE.MeshStandardMaterial({ color: 0xf0f6fc, emissive: 0x8899aa, emissiveIntensity: 0.1 });
        for (let side = -1; side <= 1; side += 2) {
            const edge = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.02, roadLength), edgeMat);
            edge.position.set(side * (roadWidth / 2 - 0.3), 0.06, 0);
            roadGroup.add(edge);
        }

        // Side objects (trees / buildings – just colored boxes)
        const colors = [0x3fb950, 0x58a6ff, 0xf0883e, 0x8b949e];
        for (let z = -roadLength / 2; z < roadLength / 2; z += 3) {
            if (Math.random() > 0.7) continue;
            const h = 0.5 + Math.random() * 1.5;
            const w = 0.5 + Math.random() * 0.5;
            const d = 0.5 + Math.random() * 0.5;
            const objMat = new THREE.MeshStandardMaterial({
                color: colors[Math.floor(Math.random() * colors.length)],
                roughness: 0.7,
            });
            const obj = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), objMat);
            const side = Math.random() > 0.5 ? 1 : -1;
            const xOffset = roadWidth / 2 + 1 + Math.random() * 2;
            obj.position.set(side * xOffset, h / 2, z);
            obj.castShadow = true;
            obj.receiveShadow = true;
            roadGroup.add(obj);
        }

        // ============================================================
        // PLAYER CAR
        // ============================================================
        const carGroup = new THREE.Group();
        scene.add(carGroup);

        // Car body
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3fb950, roughness: 0.3, metalness: 0.6 });
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.3, 1.8), bodyMat);
        body.position.y = 0.3;
        body.castShadow = true;
        carGroup.add(body);

        // Cabin
        const cabinMat = new THREE.MeshStandardMaterial({ color: 0x1a2a3a, roughness: 0.4, metalness: 0.1 });
        const cabin = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.25, 0.9), cabinMat);
        cabin.position.set(0, 0.55, -0.1);
        cabin.castShadow = true;
        carGroup.add(cabin);

        // Headlights
        const hlMat = new THREE.MeshStandardMaterial({ color: 0xffdd44, emissive: 0xffaa00, emissiveIntensity: 0.5 });
        const hl1 = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), hlMat);
        hl1.position.set(-0.3, 0.25, 0.95);
        carGroup.add(hl1);
        const hl2 = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), hlMat);
        hl2.position.set(0.3, 0.25, 0.95);
        carGroup.add(hl2);

        // Taillights
        const tlMat = new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0xff0000, emissiveIntensity: 0.3 });
        const tl1 = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), tlMat);
        tl1.position.set(-0.3, 0.25, -0.95);
        carGroup.add(tl1);
        const tl2 = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), tlMat);
        tl2.position.set(0.3, 0.25, -0.95);
        carGroup.add(tl2);

        // Car shadow (for ground)
        const shadowMat = new THREE.ShadowMaterial({ opacity: 0.3 });
        const shadowPlane = new THREE.Mesh(new THREE.PlaneGeometry(0.9, 1.8), shadowMat);
        shadowPlane.rotation.x = -Math.PI / 2;
        shadowPlane.position.y = 0.01;
        carGroup.add(shadowPlane);

        // Initial position
        carGroup.position.set(0, 0, 5);

        // ============================================================
        // ENEMY CARS
        // ============================================================
        const enemies = [];
        const enemyColors = [0xe34b4b, 0x4b7ae8, 0xe8a84b, 0x9b4be8];

        function spawnEnemy() {
            const color = enemyColors[Math.floor(Math.random() * enemyColors.length)];
            const group = new THREE.Group();

            // Body
            const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.4, metalness: 0.3 });
            const bodyMesh = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.28, 1.6), mat);
            bodyMesh.position.y = 0.28;
            bodyMesh.castShadow = true;
            group.add(bodyMesh);

            // Cabin
            const cabinEnemy = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.2, 0.8),
                new THREE.MeshStandardMaterial({ color: 0x1a2a3a }));
            cabinEnemy.position.set(0, 0.5, -0.1);
            cabinEnemy.castShadow = true;
            group.add(cabinEnemy);

            // Headlights (enemy)
            const hlE = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 6),
                new THREE.MeshStandardMaterial({ color: 0xffdd44, emissive: 0xffaa00, emissiveIntensity: 0.3 }));
            hlE.position.set(-0.25, 0.2, 0.85);
            group.add(hlE);
            const hlE2 = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 6),
                new THREE.MeshStandardMaterial({ color: 0xffdd44, emissive: 0xffaa00, emissiveIntensity: 0.3 }));
            hlE2.position.set(0.25, 0.2, 0.85);
            group.add(hlE2);

            // Random x position within road
            const x = (Math.random() - 0.5) * (roadWidth - 1.2);
            group.position.set(x, 0, -roadLength / 2 - 2);
            scene.add(group);

            const speed = 2 + Math.random() * 3 + getSpeed() * 0.3;
            enemies.push({
                mesh: group,
                speed: speed,
                width: 0.8,
                depth: 1.6,
            });
        }

        // ============================================================
        // GAME STATE
        // ============================================================
        let gameRunning = true;
        let score = 0;
        let speed = 3;
        const maxSpeed = 12;
        let nitro = 100;
        let nitroActive = false;
        let frame = 0;
        let spawnCounter = 0;
        const spawnInterval = 40;

        // Player movement
        let moveLeft = false;
        let moveRight = false;
        let accelerate = false;
        let brake = false;
        let nitroKey = false;

        function getSpeed() {
            let s = speed + Math.floor(score / 150) * 0.5;
            if (nitroActive) s *= 1.5;
            return Math.min(s, maxSpeed);
        }

        // ============================================================
        // COLLISION DETECTION (AABB)
        // ============================================================
        function getCarBox(group) {
            const pos = group.position;
            return {
                x: pos.x,
                z: pos.z,
                w: 0.9,
                d: 1.8,
            };
        }

        function boxesCollide(a, b) {
            return Math.abs(a.x - b.x) < (a.w / 2 + b.w / 2) &&
                Math.abs(a.z - b.z) < (a.d / 2 + b.d / 2);
        }

        // ============================================================
        // RESET GAME
        // ============================================================
        function resetGame() {
            // Remove enemies
            for (const e of enemies) {
                scene.remove(e.mesh);
            }
            enemies.length = 0;
            gameRunning = true;
            score = 0;
            speed = 3;
            nitro = 100;
            nitroActive = false;
            frame = 0;
            spawnCounter = 0;
            carGroup.position.set(0, 0, 5);
            carGroup.rotation.y = 0;
            scoreDisplay.textContent = '🏁 0 m';
            nitroDisplay.textContent = '💨 NITRO';
            nitroDisplay.style.color = '#f5a623';
            restartBtn.style.display = 'none';
            // Restart engine
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            startEngine();
        }

        // ============================================================
        // GAME LOOP
        // ============================================================
        function update() {
            if (!gameRunning) {
                if (engineGain) {
                    engineGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
                }
                return;
            }

            const currentSpeed = getSpeed();
            score += 0.1 * (1 + (nitroActive ? 0.6 : 0));
            scoreDisplay.textContent = `🏁 ${Math.floor(score)} m`;

            // Engine sound
            const speedFactor = Math.min(currentSpeed / maxSpeed, 1);
            updateEngine(speedFactor);

            // Nitro
            if (nitroKey && nitro > 5 && !nitroActive) {
                nitroActive = true;
                playNitro();
            }
            if (nitroActive) {
                nitro -= 0.5;
                if (nitro <= 0) {
                    nitro = 0;
                    nitroActive = false;
                    nitroDisplay.textContent = '⛽ EMPTY';
                    nitroDisplay.style.color = '#f85149';
                } else {
                    nitroDisplay.textContent = `💨 ${Math.floor(nitro)}%`;
                    nitroDisplay.style.color = '#f5a623';
                }
            } else {
                nitro = Math.min(100, nitro + 0.08);
                if (nitro > 20) {
                    nitroDisplay.textContent = '💨 NITRO';
                    nitroDisplay.style.color = '#f5a623';
                }
            }

            // Player steering
            const steerSpeed = 0.08;
            let targetRot = 0;
            if (moveLeft) targetRot = 0.4;
            if (moveRight) targetRot = -0.4;
            carGroup.rotation.y += (targetRot - carGroup.rotation.y) * 0.1;

            // Move forward/backward
            const forward = accelerate ? 1 : (brake ? -0.5 : 0);
            const moveZ = forward * currentSpeed * 0.08;
            carGroup.position.z += moveZ;

            // Lateral movement based on rotation
            const lateral = Math.sin(carGroup.rotation.y) * currentSpeed * 0.06;
            carGroup.position.x += lateral;

            // Clamp lateral position to road
            const halfRoad = roadWidth / 2 - 0.5;
            if (carGroup.position.x > halfRoad) carGroup.position.x = halfRoad;
            if (carGroup.position.x < -halfRoad) carGroup.position.x = -halfRoad;

            // Keep car on road (z bounds)
            if (carGroup.position.z > 10) carGroup.position.z = 10;
            if (carGroup.position.z < -roadLength / 2 + 2) {
                // Game over if you fall off the back? Actually we keep moving forward, we'll scroll road later.
                // For simplicity, we'll just wrap the road. We'll move road group instead.
            }

            // Move road and enemies relative to player
            // Instead of moving road, we move everything else
            // We'll shift the road group forward so player stays near origin
            // Actually we'll move everything in the z direction relative to player.
            // Simpler: move all enemies and road objects toward player.
            // We'll just move enemies; road is fixed and we'll reposition player z.

            // Spawn enemies
            spawnCounter++;
            const spawnRate = Math.max(15, spawnInterval - Math.floor(score / 30));
            if (spawnCounter >= spawnRate) {
                spawnCounter = 0;
                if (enemies.length < 15) spawnEnemy();
            }

            // Move enemies toward player
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.mesh.position.z += e.speed * 0.08;

                // Collision with player
                const playerBox = getCarBox(carGroup);
                const enemyBox = getCarBox(e.mesh);
                if (boxesCollide(playerBox, enemyBox)) {
                    gameRunning = false;
                    playCrash();
                    stopEngine();
                    restartBtn.style.display = 'block';
                    return;
                }

                // Remove if passed player
                if (e.mesh.position.z > 12) {
                    scene.remove(e.mesh);
                    enemies.splice(i, 1);
                }
            }

            // Camera follow
            const targetCamZ = carGroup.position.z - 6;
            camera.position.z += (targetCamZ - camera.position.z) * 0.05;
            camera.position.x += (carGroup.position.x * 0.3 - camera.position.x) * 0.05;
            camera.lookAt(carGroup.position.x * 0.3, 0, carGroup.position.z - 2);

            // Score = distance driven (roughly)
            // We'll just increment score each frame
        }

        // ============================================================
        // RENDER LOOP
        // ============================================================
        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        // ============================================================
        // INPUT HANDLING
        // ============================================================
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) {
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    resetGame();
                }
                return;
            }
            switch (e.key) {
                case 'ArrowLeft':
                    moveLeft = true;
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    moveRight = true;
                    e.preventDefault();
                    break;
                case 'ArrowUp':
                    accelerate = true;
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    brake = true;
                    e.preventDefault();
                    break;
                case ' ':
                case 'Space':
                    nitroKey = true;
                    e.preventDefault();
                    break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch (e.key) {
                case 'ArrowLeft':
                    moveLeft = false;
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    moveRight = false;
                    e.preventDefault();
                    break;
                case 'ArrowUp':
                    accelerate = false;
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    brake = false;
                    e.preventDefault();
                    break;
                case ' ':
                case 'Space':
                    nitroKey = false;
                    e.preventDefault();
                    break;
            }
        });

        // Touch support (simple – drag left/right to steer)
        let touchX = null;
        renderer.domElement.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            touchX = touch.clientX;
            initAudio();
            startEngine();
        });
        renderer.domElement.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!gameRunning || touchX === null) return;
            const touch = e.touches[0];
            const delta = touch.clientX - touchX;
            touchX = touch.clientX;
            // Map to steering
            if (delta > 5) {
                moveRight = true;
                moveLeft = false;
                setTimeout(() => { moveRight = false; }, 50);
            } else if (delta < -5) {
                moveLeft = true;
                moveRight = false;
                setTimeout(() => { moveLeft = false; }, 50);
            }
            // Accelerate on touch
            accelerate = true;
        });
        renderer.domElement.addEventListener('touchend', (e) => {
            e.preventDefault();
            touchX = null;
            accelerate = false;
            moveLeft = false;
            moveRight = false;
        });

        // Restart button
        restartBtn.addEventListener('click', resetGame);

        // ============================================================
        // WINDOW RESIZE
        // ============================================================
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        // ============================================================
        // START
        // ============================================================
        resetGame();
